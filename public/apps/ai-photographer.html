<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photographer Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        :root {
            --bg-color: #050505;
            --panel-color: #171a21;
            --accent-color: #40a5cd;
            --text-color: #e2e8f0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        .card {
            background-color: var(--panel-color);
            border: 1px solid #2d3748;
            border-radius: 0.75rem;
        }

        #viewport-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #2d3748 0%, #000000 100%);
            border-radius: 0.5rem;
            border: 1px solid #4a5568;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #viewport-container {
            border: 2px solid #4a5568; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            transition: width 0.3s, height 0.3s;
            position: relative;
            background: transparent;
        }
        
        #grid-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            display: none;
            z-index: 5;
        }
        .grid-line-v { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.25); }
        .grid-line-h { position: absolute; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.25); }

        canvas { display: block; outline: none; }

        .btn-select {
            transition: all 0.2s;
            border: 1px solid #2d3748;
            background: #22252d;
            color: #a0aec0;
        }
        .btn-select:hover {
            border-color: var(--accent-color);
            color: white;
            background: #2d3748;
        }
        .btn-select.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
        }

        .visual-card {
            position: relative;
            cursor: pointer;
            border-radius: 6px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.2s;
            background: #000;
        }
        .visual-card img {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.6); transition: filter 0.3s;
        }
        .visual-card:hover img { filter: brightness(0.3); }
        .visual-card.active { border-color: var(--accent-color); }
        .visual-card.active img { filter: brightness(0.8); }
        
        .visual-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            color: white; font-size: 11px; font-weight: bold;
            padding: 4px; text-align: center; pointer-events: none;
            transition: opacity 0.2s;
        }
        
        .visual-overlay {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            padding: 8px; text-align: center;
            opacity: 0; transition: opacity 0.2s;
            pointer-events: none;
        }
        .visual-card:hover .visual-overlay { opacity: 1; }
        .visual-desc {
            color: #fff; font-size: 10px; line-height: 1.3; font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .card-portrait { aspect-ratio: 2/3; }
        .card-landscape { aspect-ratio: 16/9; }

        .ar-icon {
            border: 1px solid #4a5568;
            background: #2d3748;
            margin: 0 auto 3px;
        }
        .active .ar-icon { background: #fff; border-color: #fff; }

        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 14px; width: 14px;
            border-radius: 50%; background: #fff;
            border: 2px solid var(--accent-color); margin-top: -5px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; background: #4a5568; border-radius: 2px;
        }
        .kelvin-track::-webkit-slider-runnable-track {
            background: linear-gradient(90deg, #ff8a00 0%, #ffffff 50%, #4a9eff 100%);
            height: 6px;
        }
        .spectrum-bar {
            width: 100%; height: 8px; margin-top: 6px; border-radius: 2px;
            background: linear-gradient(90deg, #ff3300 0%, #ff8a00 20%, #ffffff 50%, #4a9eff 80%, #0066ff 100%);
            opacity: 0.8;
        }

        .scroll-col { overflow-y: auto; height: 100%; padding-right: 4px; }

        .vp-btn {
            position: absolute; top: 10px; 
            background: rgba(0,0,0,0.6); color: white;
            border: 1px solid #444; padding: 4px 10px;
            border-radius: 4px; font-size: 11px; cursor: pointer; z-index: 10;
            transition: all 0.2s;
        }
        .vp-btn:hover { background: var(--accent-color); }
        .vp-btn.active { background: var(--accent-color); border-color: white; }

        .custom-input {
            background: #222; border: 1px solid #4a5568; color: #fff;
            padding: 2px 6px; border-radius: 4px; font-size: 14px; font-family: monospace; font-weight: bold;
            text-align: center; width: 55px;
        }
        .custom-input:focus { outline: none; border-color: var(--accent-color); }

        .knob-container {
            position: relative; display: flex; flex-direction: column; align-items: center; cursor: ew-resize; 
        }
        .knob-circle {
            border-radius: 50%;
            background: radial-gradient(145deg, #2a2d35, #181a1f);
            box-shadow: 4px 4px 8px #0e0f12, -4px -4px 8px #262a32;
            position: relative; border: 2px solid #374151; transition: border-color 0.2s;
        }
        .knob-container:hover .knob-circle { border-color: var(--accent-color); }
        .knob-container:active .knob-circle { border-color: #fff; }
        .knob-indicator {
            position: absolute; top: 50%; left: 50%; height: 3px; background: var(--accent-color);
            transform-origin: left center; pointer-events: none; border-radius: 2px;
        }
        .knob-value-label {
            margin-top: 6px; font-family: monospace; font-size: 11px; font-weight: bold; color: #e2e8f0; text-align: center;
        }
        .knob-sub-label {
            font-size: 9px; color: var(--accent-color); text-align: center; height: 12px;
        }

        /* Creator Signature */
        .creator-sig {
            position: fixed; bottom: 8px; left: 12px; font-size: 10px; color: #4a5568; font-family: sans-serif; pointer-events: none; opacity: 0.6; z-index: 50;
        }
    </style>
</head>

        function initDragKnob(id, onChange) {
            const el = $(id);
            const indicator = el.querySelector('.knob-indicator');
            let isDragging = false;
            let startX = 0;
            let startPct = 0;
            let currentPct = 0; 

            if(id === 'lens-knob') currentPct = 3 / 6; 
            else if(id === 'knob-aperture') currentPct = 3 / 8;
            else if(id === 'knob-shutter') currentPct = 3 / 7;
            
            const updateVisual = (pct) => {
                const ang = -135 + (pct * 270);
                indicator.style.transform = `rotate(${ang}deg)`;
            };
            updateVisual(currentPct);

            el.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX;
                startPct = currentPct;
                document.body.style.cursor = 'ew-resize';
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const deltaX = e.clientX - startX;
                const sensitivity = 200; 
                let rawPct = startPct + (deltaX / sensitivity);
                rawPct = Math.max(0, Math.min(1, rawPct));
                const snappedPct = onChange(rawPct);
                if(snappedPct !== undefined) {
                    updateVisual(snappedPct);
                } else {
                    updateVisual(rawPct);
                }
            });

            window.addEventListener('mouseup', (e) => {
                if(isDragging) {
                    const deltaX = e.clientX - startX;
                    let rawPct = startPct + (deltaX / 200);
                    rawPct = Math.max(0, Math.min(1, rawPct));
                    const snapped = onChange(rawPct);
                    currentPct = (snapped !== undefined) ? snapped : rawPct;
                    updateVisual(currentPct);
                }
                isDragging = false;
                document.body.style.cursor = 'default';
            });
        }

                for (let i = -2; i < 3; i++) {
                    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 3.5, 8), lampMat);
                    pole.position.set(side * 1.7, 1.75, i * 5);
                    pole.castShadow = true;
                    lG.add(pole);

                    // Lamp arm
                    const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.5, 6), lampMat);
                    arm.rotation.z = side * Math.PI / 2.5;
                    arm.position.set(side * 1.55, 3.4, i * 5);
                    lG.add(arm);

                    // Lamp head
                    const lampHead = new THREE.Mesh(
                        new THREE.BoxGeometry(0.15, 0.06, 0.08),
                        new THREE.MeshStandardMaterial({ color: 0x8a8a8a, roughness: 0.3, metalness: 0.2 })
                    );
                    lampHead.position.set(side * 1.4, 3.55, i * 5);
                    lG.add(lampHead);
                }
            });

            lG.traverse(child => { if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; } });
            scene.add(lG);
            subjects.landscape = lG;
            lG.visible = false;
        }

        function resizeViewport() {
            const wrapper = $('viewport-wrapper'); const container = $('viewport-container');
            const w = wrapper.clientWidth - 20; const h = w * (state.ar.h / state.ar.w); const maxH = wrapper.clientHeight - 20;
            let finalW = w, finalH = h; if (finalH > maxH) { finalH = maxH; finalW = finalH * (state.ar.w / state.ar.h); }
            container.style.width = `${finalW}px`; container.style.height = `${finalH}px`;
            renderer.setSize(finalW, finalH); camera.aspect = state.ar.w / state.ar.h; camera.updateProjectionMatrix();
        }

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }

        function updateColorTemp(k) {
            const temp = k / 100; let r, g, b;
            if(temp <= 66) { r = 255; g = 99.47 * Math.log(temp) - 161.1; b = temp <= 19 ? 0 : 138.5 * Math.log(temp - 10) - 305; } 
            else { r = 329.7 * Math.pow(temp - 60, -0.133); g = 288.1 * Math.pow(temp - 60, -0.075); b = 255; }
            const color = `rgb(${Math.max(0,Math.min(255,r))}, ${Math.max(0,Math.min(255,g))}, ${Math.max(0,Math.min(255,b))})`;
            mainLight.color.set(color); ambientLight.color.set(color);
            let label = "Neutral";
            if(k < 2000) label = "Candlelight"; else if(k < 3000) label = "Tungsten"; else if(k < 4500) label = "Warm White"; else if(k < 6000) label = "Daylight"; else if(k < 7500) label = "Cloudy"; else if(k < 9000) label = "Blue Hour"; else label = "Deep Blue";
            const displayEl = $('tempDisplayCombined'); displayEl.innerText = `${k}K - ${label}`; displayEl.style.color = color;
        }

        function calculateMetrics() {
            const dist = camera.position.distanceTo(controls.target); let ss = 'Medium Shot';
            if(state.subjectMode === 'human') { if(dist < 1.0) ss = 'Extreme Close-up'; else if(dist < 1.8) ss = 'Close-up'; else if(dist < 3.5) ss = 'Medium Shot'; else if(dist < 6.0) ss = 'Full Body Shot'; else ss = 'Wide Shot'; } else if(state.subjectMode === 'product') { if(dist < 0.8) ss = 'Macro Detail'; else if(dist < 2.5) ss = 'Product Studio Shot'; else ss = 'Wide Product Shot'; } else { ss = dist < 10 ? 'Street View' : 'Wide Landscape'; } state.shotSize = ss;
            const polar = controls.getPolarAngle() * (180/Math.PI); const aziDeg = controls.getAzimuthalAngle() * (180/Math.PI); const absAzi = Math.abs(aziDeg);
            
            // --- Improved angle description (exaggerated for AI image gen) ---
            let vertAngle = '';
            let horizAngle = '';
            
            // Vertical angle (polar: 0=top, 90=eye-level, 180=bottom)
            if(polar < 20) {
                vertAngle = 'extreme top-down bird\'s eye view, camera directly above looking straight down';
            } else if(polar < 45) {
                vertAngle = 'dramatic high angle shot, camera looking down steeply from above';
            } else if(polar < 70) {
                vertAngle = 'slightly elevated camera angle, looking down gently';
            } else if(polar > 160) {
                vertAngle = 'extreme worm\'s eye view, camera on the ground looking straight up';
            } else if(polar > 135) {
                vertAngle = 'dramatic low angle shot, camera near ground level looking up';
            } else if(polar > 110) {
                vertAngle = 'low angle shot, camera below eye level looking up';
            } else {
                vertAngle = 'eye level camera angle';
            }
            
            // Horizontal angle (azimuth: 0=front, +-90=side, +-180=back)
            if(absAzi < 10) {
                horizAngle = 'facing directly toward camera, straight frontal view';
            } else if(absAzi < 50) {
                const side = aziDeg > 0 ? 'left' : 'right';
                horizAngle = `three-quarter view from the ${side}, turned slightly away from camera`;
            } else if(absAzi < 80) {
                const side = aziDeg > 0 ? 'left' : 'right';
                horizAngle = `strong three-quarter angle from the ${side} side`;
            } else if(absAzi < 100) {
                const side = aziDeg > 0 ? 'left' : 'right';
                horizAngle = `profile view, ${side} side facing camera, shot from the side`;
            } else if(absAzi < 150) {
                horizAngle = 'rear three-quarter view, mostly showing the back';
            } else {
                horizAngle = 'shot from behind, back of subject facing camera';
            }
            
            // Combine into a single descriptive string
            let finalAngle;
            if(polar < 20 || polar > 160) {
                // extreme vertical angles dominate
                finalAngle = vertAngle;
            } else if(polar >= 70 && polar <= 110) {
                // eye level - horizontal matters more
                finalAngle = horizAngle;
            } else {
                // combine both
                finalAngle = `${vertAngle}, ${horizAngle}`;
            }
            
            state.angleString = finalAngle; 
            // Short version for debug display
            let shortAngle = '';
            if(polar < 20) shortAngle = 'Top-Down';
            else if(polar < 45) shortAngle = 'High Angle';
            else if(polar < 70) shortAngle = 'Slightly High';
            else if(polar > 160) shortAngle = "Worm's Eye";
            else if(polar > 135) shortAngle = 'Low Angle';
            else if(polar > 110) shortAngle = 'Slightly Low';
            else shortAngle = 'Eye Level';
            
            if(absAzi < 10) shortAngle += ' / Front';
            else if(absAzi < 50) shortAngle += ` / Â¾ ${aziDeg > 0 ? 'L' : 'R'}`;
            else if(absAzi < 100) shortAngle += ` / Side ${aziDeg > 0 ? 'L' : 'R'}`;
            else if(absAzi < 150) shortAngle += ' / Rear Â¾';
            else shortAngle += ' / Back';
            
            $('debug-angle').innerText = shortAngle;
            
            const subjectPos = new THREE.Vector3(0, 1.7, 0); subjectPos.project(camera);
            const x = subjectPos.x, y = subjectPos.y; let comp = 'Centered Composition';
            const isLeft = x < -0.2, isRight = x > 0.2, isTop = y > 0.2, isBottom = y < -0.2;
            if (isLeft && isTop) comp = 'Rule of Thirds (Top-Left)'; else if (isRight && isTop) comp = 'Rule of Thirds (Top-Right)'; else if (isLeft && isBottom) comp = 'Rule of Thirds (Bottom-Left)'; else if (isRight && isBottom) comp = 'Rule of Thirds (Bottom-Right)'; else if (isLeft) comp = 'Subject Placed Left'; else if (isRight) comp = 'Subject Placed Right'; else if (isTop) comp = 'Headroom / Upper Framing'; else if (isBottom) comp = 'Lower Framing';
            state.composition = comp; $('debug-comp').innerText = comp;
            updatePrompt();
        }

        function updatePrompt() {
            const tags = $('compositionTags');
            // Short tag display
            const shortAngle = $('debug-angle').innerText;
            tags.innerHTML = `
                <span class="px-2 py-1 bg-gray-800 text-cyan-300 text-[9px] rounded border border-gray-700 whitespace-nowrap">${state.shotSize}</span>
                <span class="px-2 py-1 bg-gray-800 text-cyan-300 text-[9px] rounded border border-gray-700 whitespace-nowrap">${shortAngle}</span>
                <span class="px-2 py-1 bg-gray-800 text-cyan-300 text-[9px] rounded border border-gray-700 whitespace-nowrap">${state.composition}</span>
            `;

            const p = [];
            let subj = $('subjectDetail').value.trim();
            if(!subj) subj = state.subjectMode === 'human' ? "Portrait of a person" : (state.subjectMode === 'product' ? "Product shot" : "Landscape view");
            p.push(`**${subj}**`);
            // Sub mode style kw
            p.push(state.subMode.kw);
            
            p.push(state.shotSize);
            
            if(state.composition.includes('Rule of Thirds')) p.push("rule of thirds composition, subject offset from center");
            else if(state.composition.includes('Left')) p.push("subject positioned on the left side of frame, off-center composition");
            else if(state.composition.includes('Right')) p.push("subject positioned on the right side of frame, off-center composition");
            else if(state.composition !== 'Centered Composition') p.push(state.composition.toLowerCase());
            
            // Angle: use the verbose description directly
            p.push(state.angleString);
            
            // Camera body keywords
            p.push(state.camera.kw);
            
            // Lens: more descriptive based on focal length ranges
            const fl = state.focal;
            let lensDesc = '';
            if(fl <= 10) {
                lensDesc = `${fl}mm fisheye lens, extreme barrel distortion, ultra-wide 180Â° field of view, everything in focus`;
            } else if(fl <= 18) {
                lensDesc = `${fl}mm ultra-wide angle lens, expansive field of view, exaggerated perspective distortion, deep depth of field`;
            } else if(fl <= 28) {
                lensDesc = `${fl}mm wide angle lens, broad environmental context visible, slight perspective distortion at edges`;
            } else if(fl <= 40) {
                lensDesc = `${fl}mm lens, natural perspective similar to human eye, balanced field of view`;
            } else if(fl <= 60) {
                lensDesc = `${fl}mm standard lens, natural perspective, minimal distortion, classic framing`;
            } else if(fl <= 100) {
                lensDesc = `${fl}mm portrait telephoto lens, flattering perspective compression, subject isolation from background`;
            } else if(fl <= 200) {
                lensDesc = `${fl}mm telephoto lens, strong background compression, distant subject appears closer, narrow field of view`;
            } else {
                lensDesc = `${fl}mm super telephoto lens, extreme compression, paper-thin depth of field, heavily compressed background`;
            }
            p.push(lensDesc);
            
            let k = state.temp;
            let t = "neutral lighting";
            if(k < 2000) t = "dim candlelight, warm firelight glow, deep orange ambient";
            else if(k < 3000) t = "warm tungsten lighting, cozy indoor atmosphere, amber cast";
            else if(k < 4500) t = "warm golden hour lighting, soft golden sunlight, romantic warmth";
            else if(k < 6000) t = "neutral daylight, clean white balanced lighting, natural colors";
            else if(k < 7500) t = "cool overcast sky lighting, soft diffused light, subtle blue cast";
            else if(k < 9000) t = "cold blue hour lighting, cinematic cool blue tone, twilight atmosphere";
            else t = "extremely cold blue-white lighting, clinical sterile atmosphere, icy tone";
            p.push(t);

            const eff = state.eff;
            const aperture = APERTURES[eff.apertureIdx];
            if(aperture <= 1.4) p.push(`f/${aperture}, extremely shallow depth of field, dreamy creamy bokeh, background completely dissolved`);
            else if(aperture < 2.0) p.push(`f/${aperture}, shallow depth of field, beautiful creamy bokeh circles, soft blurred background`);
            else if(aperture < 4.0) p.push(`f/${aperture}, moderate bokeh, pleasantly blurred background, subject separation`);
            else if(aperture >= 16) p.push(`f/${aperture}, everything in sharp focus, deep depth of field from foreground to background`);
            else if(aperture >= 11) p.push(`f/${aperture}, wide depth of field, most of the scene in focus`);
            
            const shutter = SHUTTERS[eff.shutterIdx];
            if(eff.shutterIdx >= 6) p.push(`${shutter} long exposure, silky smooth motion blur, light trails, flowing water effect`);
            else if(eff.shutterIdx === 5) p.push(`${shutter} slow shutter speed, visible motion blur, intentional movement`);
            else if(eff.shutterIdx <= 1) p.push(`${shutter} ultra fast shutter speed, frozen action, every detail crisp and sharp`);

            if(eff.vignetteIdx > 0) p.push(['','subtle dark vignette at edges','noticeable vignette darkening corners','heavy dark vignette framing the subject'][eff.vignetteIdx]);
            if(eff.chromaticIdx > 0) p.push(['','slight chromatic aberration on edges','visible chromatic aberration, color fringing','strong chromatic aberration, rgb color split, glitch aesthetic'][eff.chromaticIdx]);

            p.push("ACES color space, high fidelity, 8k");

            $('finalOutput').value = p.join(", ") + " " + state.ar.val;
        }

        window.addEventListener('load', initApp);
    </script>
